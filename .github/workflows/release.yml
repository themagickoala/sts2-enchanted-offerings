name: Release and Upload to Nexus Mods

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.5
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: 7389833
          filename: EnchantedOfferings.zip
          version: ${{ github.ref_name }}
          file_category: main
